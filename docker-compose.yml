services:
  backend:
    build:
      context: ./backend
    platform: linux/amd64
    environment:
      DATABASE_URL: file:/data/prod.db
      JWT_SECRET: change-this-in-production
      UPLOAD_DIR: /data/uploads
      NODE_ENV: production
      SEED_ON_START: "false"
    volumes:
      - secsa-data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3001/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 45s

  frontend:
    build:
      context: ./frontend
    platform: linux/amd64
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy

  caddy:
    image: caddy:2-alpine
    platform: linux/amd64
    ports:
      - "5173:443"
      - "80:80"
    volumes:
      - ./docker/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - frontend

volumes:
  secsa-data:
  caddy-data:
  caddy-config:
