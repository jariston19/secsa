services:
  backend:
    build:
      context: ./backend
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: file:/data/prod.db
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in a .env file at the repo root}
      UPLOAD_DIR: /data/uploads
      NODE_ENV: production
      SEED_ON_START: "false"
    volumes:
      - secsa-data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3001/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 45s

  frontend:
    build:
      context: ./frontend
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  secsa-data:
