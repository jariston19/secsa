<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f2f2f7" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <link rel="icon" type="image/png" href="/secsa.png" />
    <link rel="apple-touch-icon" href="/secsa.png" />
    <title>SECSA Exam Platform</title>
    <script>
      (function () {
        var stored = localStorage.getItem("secsa-theme");
        var theme = stored === "light" || stored === "dark" ? stored : "light";
        document.documentElement.setAttribute("data-theme", theme);
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute("content", theme === "dark" ? "#000000" : "#f2f2f7");
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
